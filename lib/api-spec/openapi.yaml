openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scripts
    description: Script generation operations
  - name: analyze
    description: Competitor video analysis operations
  - name: chat
    description: AI chat operations
  - name: clips
    description: Clip strategy operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /generate:
    post:
      operationId: generateScript
      tags: [scripts]
      summary: Generate viral YouTube Shorts script
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateScriptBody"
      responses:
        "200":
          description: Generated script
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedScript"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /analyze:
    post:
      operationId: analyzeVideo
      tags: [analyze]
      summary: Analyze competitor video and generate improved viral script
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeVideoBody"
      responses:
        "200":
          description: Full video analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoAnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /chat:
    post:
      operationId: chatWithAI
      tags: [chat]
      summary: Chat with AI growth advisor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatBody"
      responses:
        "200":
          description: AI reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clip-analyze:
    post:
      operationId: analyzeClips
      tags: [clips]
      summary: Generate clip strategy for a video URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClipAnalyzeBody"
      responses:
        "200":
          description: Clip strategy result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClipAnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    GenerateScriptBody:
      type: object
      properties:
        topic:
          type: string
      required: [topic]
    GeneratedScript:
      type: object
      properties:
        hook:
          type: string
        body:
          type: string
        cta:
          type: string
      required: [hook, body, cta]
    AnalyzeVideoBody:
      type: object
      properties:
        url:
          type: string
      required: [url]
    VideoAnalysis:
      type: object
      properties:
        hook_analysis:
          type: string
        structure:
          type: string
        strengths:
          type: string
        weaknesses:
          type: string
      required: [hook_analysis, structure, strengths, weaknesses]
    ImprovedScript:
      type: object
      properties:
        hook:
          type: string
        intro:
          type: string
        main_content:
          type: string
        cta:
          type: string
        style:
          type: string
        additional_scenes:
          type: string
      required: [hook, intro, main_content, cta, style, additional_scenes]
    SEOData:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        hashtags:
          type: array
          items:
            type: string
      required: [title, description, hashtags]
    PerformanceEstimate:
      type: object
      properties:
        views_24h:
          type: string
        views_7d:
          type: string
        retention_score:
          type: string
        virality_score:
          type: string
      required: [views_24h, views_7d, retention_score, virality_score]
    VideoVersion:
      type: object
      properties:
        style:
          type: string
        hook:
          type: string
        script:
          type: string
        why_it_works:
          type: string
      required: [style, hook, script, why_it_works]
    VideoAnalysisResult:
      type: object
      properties:
        topic:
          type: string
        video_analysis:
          $ref: "#/components/schemas/VideoAnalysis"
        improved_script:
          $ref: "#/components/schemas/ImprovedScript"
        seo:
          $ref: "#/components/schemas/SEOData"
        performance_estimate:
          $ref: "#/components/schemas/PerformanceEstimate"
        multiple_versions:
          type: array
          items:
            $ref: "#/components/schemas/VideoVersion"
      required: [topic, video_analysis, improved_script, seo, performance_estimate, multiple_versions]
    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required: [role, content]
    ChatBody:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        platform:
          type: string
      required: [messages]
    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        remainingChats:
          type: number
        isLimitReached:
          type: boolean
      required: [reply]
    ClipAnalyzeBody:
      type: object
      properties:
        url:
          type: string
        platform:
          type: string
      required: [url]
    ClipSegment:
      type: object
      properties:
        clip_number:
          type: number
        title:
          type: string
        timestamp_start:
          type: string
        timestamp_end:
          type: string
        hook:
          type: string
        why_viral:
          type: string
        platform_fit:
          type: array
          items:
            type: string
      required: [clip_number, title, timestamp_start, timestamp_end, hook, why_viral, platform_fit]
    PlatformTips:
      type: object
      properties:
        tiktok:
          type: string
        youtube_shorts:
          type: string
        instagram_reels:
          type: string
      required: [tiktok, youtube_shorts, instagram_reels]
    ClipAnalysisResult:
      type: object
      properties:
        topic:
          type: string
        total_clips:
          type: number
        best_clip_index:
          type: number
        clips:
          type: array
          items:
            $ref: "#/components/schemas/ClipSegment"
        platform_tips:
          $ref: "#/components/schemas/PlatformTips"
        caption:
          type: string
        hashtags:
          type: array
          items:
            type: string
      required: [topic, total_clips, best_clip_index, clips, platform_tips, caption, hashtags]
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]
